<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website to PDF Converter - Dr. William</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:wght@400;600;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f0ebe3; }
        .serif { font-family: 'Source Serif Pro', serif; }
        .gradient-bar { background: linear-gradient(90deg, #1B5E20, #FFD600, #0D47A1); height: 6px; }
        .drop-zone {
            border: 3px dashed #1B5E20;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            background: #fafffe;
            cursor: pointer;
        }
        .drop-zone:hover, .drop-zone.dragover {
            background: #e8f5e9;
            border-color: #FFD600;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1B5E20;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .preview-container {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #fafafa;
        }
        .preview-container iframe {
            width: 100%;
            min-height: 500px;
            border: none;
        }
        .status-bar {
            transition: all 0.5s;
        }
        .url-input:focus {
            ring: 2px solid #1B5E20;
            border-color: #1B5E20;
        }
        .btn-progress {
            background: linear-gradient(90deg, #1B5E20, #43A047);
            background-size: 200% 100%;
            animation: progress 2s ease-in-out infinite;
        }
        @keyframes progress { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 400px;
        }
        .toast {
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            animation: slideUp 0.4s ease;
            transform-origin: bottom right;
        }
        .toast.success { background: #1B5E20; }
        .toast.error { background: #C62828; }
        .toast.warning { background: #E65100; }
        .toast.info { background: #0D47A1; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .badge { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .badge-green { background: #E8F5E9; color: #1B5E20; }
        .badge-red { background: #FFEBEE; color: #C62828; }
        .badge-blue { background: #E3F2FD; color: #0D47A1; }
    </style>
</head>
<body>

<div class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Toast Container -->
        <div id="toastContainer" class="toast-container"></div>

        <!-- Header -->
        <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
            <div>
                <h1 class="text-3xl font-bold text-green-800 serif">🌐 Website to PDF Converter</h1>
                <p class="text-gray-600">Ingiza URL, mfumo utachukua screenshot na kuunda PDF</p>
            </div>
            <div class="flex gap-3 flex-wrap">
                <button onclick="convertToPDF()" id="convertBtn" class="bg-green-700 hover:bg-green-800 text-white px-6 py-3 rounded-lg font-bold flex items-center gap-2 transition">
                    <i data-lucide="file-pdf" class="w-5 h-5"></i> Badilisha kuwa PDF
                </button>
                <button onclick="openInNewTab()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold flex items-center gap-2 transition">
                    <i data-lucide="external-link" class="w-5 h-5"></i> Fungua Website
                </button>
            </div>
        </div>

        <!-- URL Input Section -->
        <div class="bg-white p-6 rounded-xl shadow-lg mb-6">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">🔗 URL ya Website</label>
                    <input type="url" id="urlInput" class="url-input w-full border-2 border-gray-300 rounded-lg p-3 text-lg outline-none transition" 
                           placeholder="https://example.com" value="https://www.tra.go.tz/">
                </div>
                <div class="flex items-end gap-3">
                    <button onclick="loadWebsite()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition whitespace-nowrap">
                        <i data-lucide="globe" class="w-5 h-5 inline"></i> Chukua
                    </button>
                    <button onclick="clearAll()" class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-3 rounded-lg font-bold transition">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <div class="mt-2 flex flex-wrap gap-3">
                <span class="text-xs text-gray-500">Mifano:</span>
                <button onclick="setURL('https://www.tra.go.tz/')" class="text-xs text-blue-600 hover:underline">TRA</button>
                <button onclick="setURL('https://www.mof.go.tz/')" class="text-xs text-blue-600 hover:underline">Wizara ya Fedha</button>
                <button onclick="setURL('https://www.nbs.go.tz/')" class="text-xs text-blue-600 hover:underline">NBS</button>
                <button onclick="setURL('https://www.vodacom.co.tz/')" class="text-xs text-blue-600 hover:underline">Vodacom</button>
                <button onclick="setURL('https://www.mzalendokilimo.com/')" class="text-xs text-blue-600 hover:underline">MzalendoKilimo</button>
            </div>
        </div>

        <!-- Status Bar -->
        <div id="statusBar" class="bg-white p-4 rounded-xl shadow-lg mb-6 flex items-center justify-between status-bar">
            <div class="flex items-center gap-3">
                <div id="statusIcon" class="text-2xl">⏳</div>
                <div>
                    <div id="statusText" class="font-semibold text-gray-700">Tayari kwa kazi</div>
                    <div id="statusDetail" class="text-sm text-gray-500">Ingiza URL kisha bonyeza "Chukua"</div>
                </div>
            </div>
            <div id="progressBar" class="hidden w-32 h-2 bg-gray-200 rounded-full overflow-hidden">
                <div id="progressFill" class="h-full bg-green-600 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader"></div>

        <!-- Preview Section -->
        <div class="mt-6">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-bold text-green-800">👁️ Preview ya Website</h2>
                <span id="pageInfo" class="text-sm text-gray-500"></span>
            </div>
            <div class="preview-container" id="previewContainer">
                <iframe id="previewFrame" src="about:blank"></iframe>
            </div>
        </div>

        <!-- Options -->
        <div class="mt-6 grid md:grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-lg">
                <h3 class="font-bold text-green-800 text-sm mb-2">⚙️ Chaguo za PDF</h3>
                <div class="space-y-2 text-sm">
                    <label class="flex items-center gap-2">
                        <input type="checkbox" id="fullPage" checked>
                        <span>Chukua ukurasa mzima</span>
                    </label>
                    <label class="flex items-center gap-2">
                        <input type="checkbox" id="landscape">
                        <span>Mwelekeo wa upana (Landscape)</span>
                    </label>
                    <label class="flex items-center gap-2">
                        <input type="checkbox" id="showUrls">
                        <span>Onyesha URL chini</span>
                    </label>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-lg">
                <h3 class="font-bold text-green-800 text-sm mb-2">📏 Ukubwa wa PDF</h3>
                <div class="space-y-2 text-sm">
                    <select id="pageSize" class="w-full border rounded-lg p-2">
                        <option value="a4">A4</option>
                        <option value="a3">A3</option>
                        <option value="a5">A5</option>
                        <option value="letter">Letter</option>
                        <option value="legal">Legal</option>
                    </select>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-lg">
                <h3 class="font-bold text-green-800 text-sm mb-2">📁 Jina la Faili</h3>
                <input type="text" id="fileName" class="w-full border rounded-lg p-2 text-sm" value="website-screenshot">
                <span class="text-xs text-gray-500">.pdf itaongezwa moja kwa moja</span>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize Lucide icons
    lucide.createIcons();

    // ============================================================
    // VARIABLES
    // ============================================================
    let currentUrl = '';
    let isConverting = false;
    let capturedHtml = '';

    // ============================================================
    // TOAST NOTIFICATIONS
    // ============================================================
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'scale(0.8)';
            setTimeout(() => toast.remove(), 400);
        }, 5000);
    }

    // ============================================================
    // STATUS BAR
    // ============================================================
    function updateStatus(icon, text, detail, progress = null) {
        document.getElementById('statusIcon').textContent = icon;
        document.getElementById('statusText').textContent = text;
        document.getElementById('statusDetail').textContent = detail || '';
        
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        
        if (progress !== null) {
            progressBar.classList.remove('hidden');
            progressFill.style.width = progress + '%';
        } else {
            progressBar.classList.add('hidden');
        }
    }

    // ============================================================
    // URL FUNCTIONS
    // ============================================================
    function setURL(url) {
        document.getElementById('urlInput').value = url;
        loadWebsite();
    }

    function getValidUrl() {
        let url = document.getElementById('urlInput').value.trim();
        if (!url) {
            showToast('⚠️ Tafadhali ingiza URL', 'warning');
            return null;
        }
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }
        try {
            new URL(url);
            return url;
        } catch (e) {
            showToast('❌ URL si sahihi. Tafadhali ingiza URL halali.', 'error');
            return null;
        }
    }

    // ============================================================
    // LOAD WEBSITE
    // ============================================================
    function loadWebsite() {
        const url = getValidUrl();
        if (!url) return;
        
        currentUrl = url;
        updateStatus('🔄', 'Inapakia...', 'Inachukua website', 10);
        showToast('🔄 Inapakia website...', 'info');
        
        const frame = document.getElementById('previewFrame');
        frame.src = url;
        
        // Update filename based on URL
        const domain = new URL(url).hostname.replace('www.', '');
        document.getElementById('fileName').value = domain;
        
        // Wait for iframe to load
        frame.onload = function() {
            updateStatus('✅', 'Imepakiwa!', 'Website imepakiwa. Tayari kwa PDF', 100);
            showToast('✅ Website imepakiwa!', 'success');
            document.getElementById('pageInfo').textContent = `🌐 ${url}`;
            
            // Try to capture content for PDF
            try {
                // For same-origin or CORS-enabled sites
                const doc = frame.contentDocument || frame.contentWindow.document;
                if (doc) {
                    capturedHtml = doc.documentElement.outerHTML;
                }
            } catch (e) {
                // Cross-origin - we'll use the iframe directly for PDF
                capturedHtml = '';
                showToast('ℹ️ Website ni cross-origin. PDF itatumia iframe.', 'info');
            }
        };
        
        frame.onerror = function() {
            updateStatus('❌', 'Hitilafu!', 'Haiwezi kupakia website', 0);
            showToast('❌ Hitilafu kupakia website. Angalia URL.', 'error');
        };
        
        // Timeout after 30 seconds
        setTimeout(() => {
            if (frame.src === 'about:blank' || frame.src === url) {
                // Check if loaded
            }
        }, 30000);
    }

    // ============================================================
    // CONVERT TO PDF - USING html2pdf WITH IFRAME
    // ============================================================
    function convertToPDF() {
        if (isConverting) {
            showToast('⏳ Tafadhali subiri, PDF inaundwa...', 'warning');
            return;
        }
        
        const url = getValidUrl();
        if (!url) return;
        
        isConverting = true;
        document.getElementById('convertBtn').disabled = true;
        document.getElementById('convertBtn').innerHTML = '<div class="loader-small"></div> Inaunda PDF...';
        document.getElementById('convertBtn').classList.add('btn-progress');
        
        updateStatus('📄', 'Inaunda PDF...', 'Tafadhali subiri', 20);
        showToast('📄 Inaunda PDF...', 'info');
        
        // Get options
        const fullPage = document.getElementById('fullPage').checked;
        const landscape = document.getElementById('landscape').checked;
        const showUrls = document.getElementById('showUrls').checked;
        const pageSize = document.getElementById('pageSize').value;
        const fileName = document.getElementById('fileName').value.trim() || 'website-screenshot';
        
        // Create a container to render the website
        const container = document.createElement('div');
        container.style.width = '100%';
        container.style.maxWidth = '1200px';
        container.style.margin = '0 auto';
        container.style.padding = '20px';
        container.style.background = '#ffffff';
        container.style.fontSize = '14px';
        container.style.lineHeight = '1.6';
        container.style.color = '#333';
        
        // Add URL footer if requested
        let footerHtml = '';
        if (showUrls) {
            footerHtml = `
                <div style="text-align:center;padding:10px;margin-top:20px;border-top:2px solid #1B5E20;font-size:12px;color:#666;">
                    <span>🌐 ${url}</span>
                    <span style="margin:0 15px;">|</span>
                    <span>📅 ${new Date().toLocaleDateString('sw-TZ', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
                    <span style="margin:0 15px;">|</span>
                    <span>🕐 ${new Date().toLocaleTimeString('sw-TZ')}</span>
                </div>
            `;
        }
        
        // If we have captured HTML from same-origin, use it
        if (capturedHtml) {
            container.innerHTML = capturedHtml + footerHtml;
            updateStatus('📄', 'Inaunda PDF...', 'Inachakata HTML', 40);
            generatePDFFromElement(container, fileName, pageSize, landscape, fullPage);
        } else {
            // For cross-origin, use iframe
            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.style.width = '100%';
            iframe.style.height = '800px';
            iframe.style.border = 'none';
            container.appendChild(iframe);
            
            // Add footer
            const footerDiv = document.createElement('div');
            footerDiv.innerHTML = footerHtml;
            container.appendChild(footerDiv);
            
            // Wait for iframe to load
            iframe.onload = function() {
                updateStatus('📄', 'Inaunda PDF...', 'Iframe imepakiwa', 60);
                generatePDFFromElement(container, fileName, pageSize, landscape, fullPage);
            };
            
            // Timeout fallback
            setTimeout(() => {
                if (!isConverting) return;
                updateStatus('📄', 'Inaunda PDF...', 'Kutumia timeout', 70);
                generatePDFFromElement(container, fileName, pageSize, landscape, fullPage);
            }, 10000);
            
            // Append to body temporarily
            document.body.appendChild(container);
            container.style.display = 'block';
            container.style.position = 'absolute';
            container.style.left = '-9999px';
            container.style.top = '0';
        }
    }

    // ============================================================
    // GENERATE PDF FROM ELEMENT
    // ============================================================
    function generatePDFFromElement(element, fileName, pageSize, landscape, fullPage) {
        updateStatus('📄', 'Inaunda PDF...', 'Inaandaa html2pdf', 80);
        
        const opt = {
            margin: [10, 10, 10, 10],
            filename: `${fileName}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { 
                scale: 2, 
                useCORS: true,
                logging: false,
                letterRendering: true,
                allowTaint: true,
                backgroundColor: '#ffffff',
                scrollY: 0,
                windowHeight: fullPage ? undefined : window.innerHeight
            },
            jsPDF: { 
                unit: 'mm', 
                format: pageSize || 'a4', 
                orientation: landscape ? 'landscape' : 'portrait' 
            },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
        };
        
        // If full page, we need to scroll to capture everything
        if (fullPage) {
            opt.html2canvas.scrollY = 0;
            opt.html2canvas.windowHeight = element.scrollHeight || 2000;
        }
        
        // If element is already in DOM, use it directly
        let targetElement = element;
        let isTemp = false;
        
        if (!element.parentNode) {
            // Element not in DOM, add it temporarily
            document.body.appendChild(element);
            isTemp = true;
        }
        
        // Make sure element is visible
        element.style.display = 'block';
        element.style.position = 'relative';
        element.style.left = 'auto';
        element.style.top = 'auto';
        element.style.background = '#ffffff';
        element.style.padding = '20px';
        
        html2pdf().set(opt).from(element).save().then(function() {
            isConverting = false;
            document.getElementById('convertBtn').disabled = false;
            document.getElementById('convertBtn').innerHTML = '<i data-lucide="file-pdf" class="w-5 h-5"></i> Badilisha kuwa PDF';
            document.getElementById('convertBtn').classList.remove('btn-progress');
            lucide.createIcons();
            
            if (isTemp && element.parentNode) {
                element.parentNode.removeChild(element);
            }
            
            updateStatus('✅', 'Imekamilika!', 'PDF imepakuliwa', 100);
            showToast('✅ PDF imepakuliwa!', 'success');
            
            setTimeout(() => {
                updateStatus('✅', 'Tayari kwa kazi', 'Ingiza URL kisha bonyeza "Chukua"', null);
            }, 3000);
            
        }).catch(function(err) {
            console.error('PDF Error:', err);
            isConverting = false;
            document.getElementById('convertBtn').disabled = false;
            document.getElementById('convertBtn').innerHTML = '<i data-lucide="file-pdf" class="w-5 h-5"></i> Badilisha kuwa PDF';
            document.getElementById('convertBtn').classList.remove('btn-progress');
            lucide.createIcons();
            
            if (isTemp && element.parentNode) {
                element.parentNode.removeChild(element);
            }
            
            updateStatus('❌', 'Hitilafu!', err.message || 'Hitilafu wakati wa kuunda PDF', 0);
            showToast('❌ Hitilafu kuunda PDF: ' + err.message, 'error');
        });
    }

    // ============================================================
    // OPEN IN NEW TAB
    // ============================================================
    function openInNewTab() {
        const url = getValidUrl();
        if (url) {
            window.open(url, '_blank');
        }
    }

    // ============================================================
    // CLEAR ALL
    // ============================================================
    function clearAll() {
        document.getElementById('urlInput').value = '';
        document.getElementById('previewFrame').src = 'about:blank';
        document.getElementById('pageInfo').textContent = '';
        document.getElementById('fileName').value = 'website-screenshot';
        capturedHtml = '';
        updateStatus('⏳', 'Tayari kwa kazi', 'Ingiza URL kisha bonyeza "Chukua"', null);
        showToast('🗑️ Imefutwa', 'info');
    }

    // ============================================================
    // KEYBOARD SHORTCUTS
    // ============================================================
    document.addEventListener('keydown', function(e) {
        // Ctrl+Enter to load
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            loadWebsite();
        }
        // Ctrl+P to convert to PDF
        if (e.ctrlKey && e.shiftKey && e.key === 'P') {
            e.preventDefault();
            convertToPDF();
        }
        // Ctrl+L to load
        if (e.ctrlKey && e.key === 'l') {
            e.preventDefault();
            document.getElementById('urlInput').focus();
        }
    });

    // ============================================================
    // INIT - Load default URL
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        // Load default website
        setTimeout(loadWebsite, 500);
        showToast('🚀 Karibu! Ingiza URL ya website unayotaka kubadilisha kuwa PDF.', 'info');
    });
</script>

</body>
</html>
