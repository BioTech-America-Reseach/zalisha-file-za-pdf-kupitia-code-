<head>

    <style>

        .section-num { display: inline-block; background: #1B5E20; color: #fff; width: 36px; height: 36px; line-height: 36px; text-align: center; border-radius: 50%; font-weight: 700; margin-right: 12px; font-size: 14px; }

    // ============================================================
    // FUNCTIONS

    function loadSample() {
        document.getElementById('htmlInput').value = getSampleHTML();
        previewHTML();
        showToast('✅ Sample document loaded successfully!', 'success');
    }

    function clearInput() {
        document.getElementById('htmlInput').value = '';
        document.getElementById('previewContent').innerHTML = `
            <p class="text-2xl">📄</p>
            <p>Bandika HTML au pakia faili kuona preview</p>
        `;
        document.getElementById('uploadStatus').textContent = '';
        showToast('🗑️ Cleared', 'info');
    }

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('htmlInput').value = e.target.result;
            document.getElementById('uploadStatus').innerHTML = `<span class="text-green-600">✅ Imepakiwa: ${file.name}</span>`;
            previewHTML();
            showToast('✅ Faili imepakiwa!', 'success');
        };
        reader.readAsText(file);
    }

    function previewHTML() {
        const html = document.getElementById('htmlInput').value;
        if (!html.trim()) {
            showToast('⚠️ Tafadhali ingiza HTML kwanza', 'warning');
            return;
        }
        
        const container = document.getElementById('previewContent');
        container.innerHTML = html;
        
        // Count pages
        const pages = container.querySelectorAll('section, header, footer, .page > div');
        document.getElementById('pageCount').textContent = `📄 Sehemu: ${pages.length}`;
        
        showToast('✅ Preview imeboreshwa!', 'success');
    }

    // ============================================================
    // GENERATE PDF
    // ============================================================
    function generatePDF() {
        const html = document.getElementById('htmlInput').value;
        if (!html.trim()) {
            showToast('⚠️ Tafadhali ingiza HTML kwanza', 'warning');
            return;
        }
        
        showLoader(true);
        
        // Create a temporary container for PDF generation
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        tempDiv.style.padding = '20px';
        tempDiv.style.maxWidth = '900px';
        tempDiv.style.margin = '0 auto';
        tempDiv.style.background = '#fff';
        tempDiv.style.fontSize = '14px';
        
        // Ensure images load
        const images = tempDiv.querySelectorAll('img');
        images.forEach(img => {
            if (img.src && !img.src.startsWith('data:') && !img.src.startsWith('blob:')) {
                img.setAttribute('crossorigin', 'anonymous');
            }
        });
        
        document.body.appendChild(tempDiv);
        
        const opt = {
            margin: [10, 10, 10, 10],
            filename: 'MzalendoKilimo-Pendekezo-Kamili.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { 
                scale: 2, 
                useCORS: true,
                logging: false,
                letterRendering: true,
                allowTaint: true,
                backgroundColor: '#ffffff'
            },
            jsPDF: { 
                unit: 'mm', 
                format: 'a4', 
                orientation: 'portrait' 
            },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
        };
        
        html2pdf().set(opt).from(tempDiv).save().then(function() {
            document.body.removeChild(tempDiv);
            showLoader(false);
            showToast('✅ PDF imepakuliwa!', 'success');
        }).catch(function(err) {
            console.error(err);
            document.body.removeChild(tempDiv);
            showLoader(false);
            showToast('❌ Hitilafu wakati wa kuunda PDF: ' + err.message, 'error');
        });
    }

        const wordStyles = `
            <style>
                body { font-family: 'Calibri', 'Arial', sans-serif; max-width: 900px; margin: 0 auto; padding: 30px; background: #fff; }
                .gradient-bar { background: linear-gradient(90deg, #1B5E20, #FFD600, #0D47A1); height: 6px; }
                .canva-image { max-width: 100%; height: auto; border-radius: 8px; }
                .serif { font-family: 'Times New Roman', serif; }
                section { margin-bottom: 20px; }
                .page { max-width: 900px; margin: 0 auto; }
                .absolute { position: relative; }
                .inset-0 { padding: 20px; background: rgba(0,0,0,0.7); color: #fff; }
                .opacity-90 { opacity: 0.9; }
                .opacity-80 { opacity: 0.8; }
                .opacity-60 { opacity: 0.6; }
                .rounded-2xl { border-radius: 16px; }
                .shadow-xl { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
                .border-l-4 { border-left-width: 4px; }
                .border-green-700 { border-color: #1B5E20; }
                .border-red-600 { border-color: #C62828; }
                .border-blue-700 { border-color: #0D47A1; }
                .border-yellow-500 { border-color: #FFC107; }
                .bg-green-700 { background: #1B5E20; }
                .text-white { color: #fff; }
                .text-center { text-align: center; }
                .text-2xl { font-size: 24px; }
                .text-3xl { font-size: 28px; }
                .text-4xl { font-size: 32px; }
                .text-5xl { font-size: 36px; }
                .font-bold { font-weight: 700; }
                .font-black { font-weight: 900; }
                .leading-tight { line-height: 1.2; }
                .mb-4 { margin-bottom: 16px; }
                .mb-6 { margin-bottom: 24px; }
                .mt-3 { margin-top: 12px; }
                .p-8 { padding: 32px; }
                .p-10 { padding: 40px; }
                .grid { display: grid; }
                .grid-cols-2 { grid-template-columns: 1fr 1fr; }
                .grid-cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
                .gap-4 { gap: 16px; }
                .gap-5 { gap: 20px; }
                @media print { body { background: #fff; } }
            <\/style>
        `;
        
        // Build full document for Word
        const docHtml = `
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
                <title>MzalendoKilimo - Pendekezo Kamili</title>
                ${wordStyles}
            <\/head>
            <body>
                ${html}
            <\/body>
            <\/html>
        `;
        
        // Create a blob and download as .doc
        const blob = new Blob([docHtml], { type: 'application/msword;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'MzalendoKilimo-Pendekezo-Kamili.doc';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        
        showLoader(false);
        showToast('✅ Word document imepakuliwa!', 'success');
    }

    // ============================================================
    // DOWNLOAD HTML
    // ============================================================
    function downloadHTML() {
        const html = document.getElementById('htmlInput').value;
        if (!html.trim()) {
            showToast('⚠️ Tafadhali ingiza HTML kwanza', 'warning');
            return;
        }
        
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'MzalendoKilimo-Document.html';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        
        showToast('✅ HTML imepakuliwa!', 'success');
    }

    // ============================================================
    // TOAST NOTIFICATIONS
    // ============================================================
    function showToast(message, type = 'info') {
        const colors = {
            success: 'bg-green-600',
            warning: 'bg-yellow-600',
            error: 'bg-red-600',
            info: 'bg-blue-600'
        };
        
        const toast = document.createElement('div');
        toast.className = `fixed bottom-4 right-4 ${colors[type] || 'bg-blue-600'} text-white px-6 py-3 rounded-lg shadow-lg z-50 transition-all duration-500 max-w-md`;
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(20px)';
            setTimeout(() => toast.remove(), 500);
        }, 4000);
    }

    // ============================================================
    // LOADER
    // ============================================================
    function showLoader(show) {
        const loader = document.getElementById('loader');
        if (show) {
            loader.style.display = 'block';
        } else {
            loader.style.display = 'none';
        }
    }

    // ============================================================
    // DRAG AND DROP
    // ============================================================
    const dropZone = document.getElementById('dropZone');
    
    dropZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        this.classList.add('dragover');
    });
    
    dropZone.addEventListener('dragleave', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
    });
    
    dropZone.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
        
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            const file = files[0];
            if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('htmlInput').value = ev.target.result;
                    document.getElementById('uploadStatus').innerHTML = `<span class="text-green-600">✅ Imepakiwa: ${file.name}</span>`;
                    previewHTML();
                    showToast('✅ Faili imepakiwa!', 'success');
                };
                reader.readAsText(file);
            } else {
                showToast('⚠️ Tafadhali pakia faili ya HTML (.html, .htm)', 'warning');
            }
        }
    });

    // ============================================================
    // KEYBOARD SHORTCUTS
    // ============================================================
    document.addEventListener('keydown', function(e) {
        // Ctrl+Enter to preview
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            previewHTML();
        }
        // Ctrl+P to download PDF
        if (e.ctrlKey && e.shiftKey && e.key === 'P') {
            e.preventDefault();
            generatePDF();
        }
    });

    // ============================================================
    // INIT - Load sample on first visit
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        // Load sample by default
        document.getElementById('htmlInput').value = getSampleHTML();
        previewHTML();
        showToast('🚀 Karibu! Sample document imepakiwa. Badilisha HTML kisha bonyeza Preview.', 'info');
    });
</script>

</body>
</html>
